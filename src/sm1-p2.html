<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    
<header class="w-full bg-white font-sans text-xs text-gray-600 border-b border-gray-100">
  <!-- Верхняя панель (Контакты и информация) -->
  <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
    <!-- Логотип -->
    <a href="#" class="flex items-center gap-3 shrink-0">
      <img src="./img_h/logo.svg" alt="ГМЦ Городской медицинский центр" class="h-12 w-auto object-contain">
    </a>

    <!-- Телефон и мессенджер -->
    <div class="flex flex-col">
      <a href="#" class="text-sm font-bold text-sky-800 hover:underline">8 (495) 926-06-03</a>
      <a href="#" class="flex items-center gap-1 text-gray-500 hover:text-green-600 transition">
    <img src="./img_h/social (1).png" alt=""> Whatsapp
      </a>
    </div>

    <!-- Почта и обратный звонок -->
    <div class="flex flex-col">
      <a href="#" class="hover:text-sky-800">info@gormedcentre.ru</a>
      <button class="text-left text-gray-400 underline hover:text-gray-600 transition">Заказать звонок</button>
    </div>

    <!-- Адрес -->
    <div>
      <p>г. Мытищи,</p>
      <p>ул. Рождественская, д. 7</p>
    </div>

    <!-- Режим работы -->
    <div>
      <p>Ежедневно</p>
      <p>с 9.00 до 21.00</p>
    </div>

    <!-- Кнопки поиска и личного кабинета -->
    <div class="flex items-center gap-2 shrink-0">
      <button class="w-9 h-9 bg-[#00C6BF] hover:bg-cyan-500 text-white rounded flex items-center justify-center transition">
        <svg class="w-4 h-4 fill-none stroke-current" viewBox="0 0 24 24" stroke-width="2.5">
          <circle cx="11" cy="11" r="6" />
          <path d="M16 16l4 4" />
        </svg>
      </button>
      <a href="#" class="h-9 px-4 bg-slate-100 hover:bg-slate-200 text-sky-900 font-medium rounded flex items-center transition">
        Личный кабинет
      </a>
    </div>
  </div>

  <!-- Нижележащая панель (Навигация) -->
  <div class="bg-gray-50 border-t border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
      <!-- Главное меню -->
      <nav class="flex items-center gap-6 py-3 font-semibold text-gray-800">
        <div class="relative group">
          <button class="flex items-center gap-1 hover:text-sky-800 transition">
            Page 1 <span class="text-[10px] text-gray-400">▼</span>
          </button>
        </div>
        <a href="#" class="hover:text-sky-800 transition">Page 2</a>
        <a href="#" class="hover:text-sky-800 transition">Page 3</a>
        <a href="#" class="hover:text-sky-800 transition">Page 4</a>
        <a href="#" class="hover:text-sky-800 transition">Page 5</a>
        <div class="relative group">
          <button class="flex items-center gap-1 hover:text-sky-800 transition">
            О центре <span class="text-[10px] text-gray-400">▼</span>
          </button>
        </div>
        <a href="#" class="hover:text-sky-800 transition">Детство</a>
        <a href="#" class="hover:text-sky-800 transition">Контакты</a>
      </nav>

      <!-- Дополнительные элементы справа -->
      <div class="flex items-center gap-6 py-2 shrink-0">
        <button class="flex items-center gap-2 text-gray-600 hover:text-black transition">
<img src="./img_h/icon.png" alt="">
            <span>Версия для слабовидящих</span>
        </button>
        <a href="#" class="h-10 px-6 bg-sky-800 hover:bg-sky-900 text-white font-bold rounded flex items-center transition shadow-inner">
          Запись на приём
        </a>
      </div>
    </div>
  </div>
</header>

</body>
</html>
